<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Smart Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0b3d91, #1e88e5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div class="card p-4" style="width:380px">
  <div class="text-center mb-4">
    <div style="color:#0b3d91;font-size:22px;font-weight:700">📷 SmartAttendance</div>
    <p class="text-muted small">AI-Based Attendance System</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button class="btn btn-primary w-100 py-2 fw-bold">Login</button>
  </form>

  <div class="text-center mt-3">
    <small class="text-muted">New student? <a href="/register">Register here</a></small><br>
    <small class="text-muted">Admin: admin@gmail.com / admin123</small>
  </div>
</div>
</body>
</html>
