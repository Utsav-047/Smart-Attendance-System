
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Smart Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0b3d91, #1e88e5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .step-badge {
      background: #0b3d91;
      color: white;
      border-radius: 50%;
      width: 24px; height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      margin-right: 8px;
    }
    .step-badge.done { background: #198754; }
  </style>
</head>
<body>
<div class="card p-4" style="width:440px">

  <div class="text-center mb-3">
    <div style="color:#0b3d91;font-size:22px;font-weight:700">📷 SmartAttendance</div>
    <p class="text-muted small">Student Registration</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <!-- STEP INDICATORS -->
  <div class="mb-3 p-3 rounded" style="background:#f8f9fa;font-size:13px">
    <div class="mb-1"><span class="step-badge done" id="step1badge">1</span> Capture Face</div>
    <div><span class="step-badge" id="step2badge">2</span> Register and Train Model</div>
  </div>

  <!-- REGISTRATION FORM -->
  <form method="POST" id="registerForm">
    <input type="hidden" name="face_captured" id="faceCapturedInput" value="0">
    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name</label>
      <input type="text" name="name" id="nameInput" class="form-control" placeholder="Patel Utsav" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Roll Number</label>
      <input type="text" name="roll" id="rollInput" class="form-control" placeholder="24AIML047" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="student@email.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>

    <!-- STEP 2: REGISTER BUTTON -->
    <button type="submit" id="registerBtn" class="btn btn-primary w-100 py-2 fw-bold mb-2" disabled>
      ✅ Register and Train Model
    </button>
  </form>

  <!-- STEP 1: CAPTURE FACE BUTTON -->
  <button id="captureBtn" onclick="captureFace()" class="btn btn-warning w-100 py-2 fw-bold mb-2">
    📸 Capture Face First
  </button>

  <!-- STATUS MESSAGE -->
  <div id="statusMsg" class="text-center mt-2" style="font-size:13px;min-height:20px"></div>

  <div class="text-center mt-2">
    <small class="text-muted">Already registered? <a href="/">Login here</a></small>
  </div>
</div>

<script>
  const registered = {{ 'true' if registered else 'false' }};
  const trained = {{ 'true' if trained else 'false' }};

  window.onload = function() {
    document.getElementById('registerBtn').disabled = true;

    if (registered && trained) {
      document.getElementById('statusMsg').innerHTML =
        '<span class="text-success">🎉 Registration complete and model training started. You can now <a href="/">login</a>.</span>';
      document.getElementById('step2badge').classList.add('done');
      document.getElementById('step2badge').innerText = '✓';
      document.getElementById('captureBtn').disabled = true;
      document.getElementById('registerBtn').disabled = true;
    }
  }

  async function captureFace() {
    const roll = document.getElementById('rollInput').value.trim();
    if (!roll) {
      alert('Please enter your Roll Number first!');
      return;
    }

    const btn = document.getElementById('captureBtn');
    btn.disabled = true;
    btn.innerHTML = '⏳ Opening Camera...';
    document.getElementById('statusMsg').innerHTML =
      '<span class="text-warning">📷 Camera opening... Look at the camera! 20 photos will be taken automatically.</span>';

    try {
      const res = await fetch('/capture_face', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roll: roll })
      });
      const data = await res.json();

      if (data.error) {
        document.getElementById('statusMsg').innerHTML =
          `<span class="text-danger">❌ ${data.error}</span>`;
        btn.disabled = false;
        btn.innerHTML = '📸 Capture Face First';
      } else {
        document.getElementById('statusMsg').innerHTML =
          `<span class="text-info">📷 ${data.message} Wait for camera to finish...</span>`;
        document.getElementById('faceCapturedInput').value = '1';

        setTimeout(() => {
          document.getElementById('registerBtn').disabled = false;
          document.getElementById('statusMsg').innerHTML =
            '<span class="text-success">✅ Face captured! Now click Register to complete registration and train the model.</span>';
          btn.innerHTML = '✅ Face Captured';
          btn.disabled = true;
        }, 15000);
      }
    } catch (e) {
      document.getElementById('statusMsg').innerHTML =
        `<span class="text-danger">❌ Error: ${e.message}</span>`;
      btn.disabled = false;
      btn.innerHTML = '📸 Capture Face First';
    }
  }
</script>

</body>
</html>
